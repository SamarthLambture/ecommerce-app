# Place this file in the ROOT of your application repo (same level as frontend/ and backend/)
# SonarCloud requires sonar.organization (find it under your SonarCloud org settings)

sonar.organization=samarthlambture
sonar.projectKey=SamarthLambture_ecommerce-app
sonar.projectName=Ecommerce Store

# Scan both frontend (Angular) and backend source
sonar.sources=frontend/src,backend/src

# Exclude things Sonar shouldn't waste time analyzing
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.js,**/coverage/**

# Test file patterns (adjust if backend uses a different test runner)
sonar.tests=frontend/src,backend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.js

# JS/TS specific
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
