name: Build and ship gitOps repo

on:
  push:
    branches:
      - master

env:
  INFRA_REPO_OWNER: samarthlambture
  INFRA_REPO_NAME: ecommerce-infra-gitops

jobs:
  build-and-ship:
    runs-on: ubuntu-latest

    steps:

      # 1: checkout code
      - name: Checkout application code
        uses: actions/checkout@v4

      # 2: docker login
      - name: Dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3: build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-store-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-store-frontend:latest

      # 4: build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-store-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-store-backend:latest

      # 5: checkout infra repo
      - name: Checking out Infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO_OWNER }}/${{ env.INFRA_REPO_NAME }}
          token: ${{ secrets.GITOPS_PAT }}
          path: infra-repo

      # 6: update image tags
      - name: Updation in image tags
        run: |
          cd infra-repo/k8s-manifest
          sed -i "s|image:${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-store-frontend:.*|image:${{ DOCKERHUB_USERNAME }}/ecommerce-store-frontend:${{ github.sha }}|g" deployment.yml
          sed -i "s|image:${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-store-backend:.*|image:${{ DOCKERHUB_USERNAME }}/ecommerce-store-backend:${{ github.sha }}|g" deployment.yml

      # 7: push code to infra repo
      - name: Push changes to infra-repo
        run: |
          cd infra-repo
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s-manifest/deployment.yml
          git commit -m "chore: automated image tag update to ${{ github.sha }} from app repo"
          git push origin main
